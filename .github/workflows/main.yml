name:  Postman Collection WorkFlow
on:
  push:
    branches:  [main]
  workflow_dispatch:
  schedule:
      -  cron:  30 02 * * * # 8:00 am IST
      -  cron:  00 14 * * *  

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.2

      - name: Install Node js and npm
        uses: actions/setup-node@v6.3.0
        with:
             node-version: '22'
             
      - name: Install Newman and HTML-extra reoprt golbally
        run: | 
             npm install -g newman
             npm install -g newman-reporter-htmlextra

      - name: Run the Postman Collection with Newman
        run:  newman run CI-CD_Practice.postman_collection.json

      - name: Newman Report
        uses: actions/upload-artifact@v3.2.2
        with:
          name: Newman Report
          path: newman/*.html
            
        
      
        
      
      
    
    
      
      
